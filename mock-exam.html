<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模擬正式考試 - 計程車執業登記證</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; 
      min-height: 100vh; 
      background: linear-gradient(135deg, #7c2d12 0%, #1c1917 50%, #292524 100%);
      color: #fff;
    }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px; min-height: 100vh; }
    .flex-center { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 550px;
    }
    
    .center { text-align: center; }
    .icon-large { font-size: 64px; margin-bottom: 16px; }
    .icon-xlarge { font-size: 80px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    h2 { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
    .subtitle { color: rgba(255,255,255,0.6); font-size: 15px; margin-bottom: 24px; }
    
    .info-box {
      background: rgba(251, 146, 60, 0.1);
      border: 1px solid rgba(251, 146, 60, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .info-box p { color: rgba(255,255,255,0.8); font-size: 14px; line-height: 1.8; }
    
    .exam-info {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .exam-info-title { 
      color: #fb923c; 
      font-weight: 600; 
      font-size: 16px; 
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .exam-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .exam-info-item {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .exam-info-label { color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 4px; }
    .exam-info-value { color: #fff; font-size: 18px; font-weight: 600; }
    
    .btn-primary {
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(234, 88, 12, 0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .btn-secondary {
      flex: 1;
      padding: 14px 20px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    
    .btn-group { display: flex; gap: 12px; margin-top: 12px; }
    
    .section { margin-bottom: 24px; }
    .section-title {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    
    .city-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .city-btn {
      padding: 12px 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .city-btn:hover { background: rgba(255,255,255,0.1); }
    .city-btn.active { 
      background: rgba(16, 185, 129, 0.2); 
      border-color: #10b981; 
      color: #34d399;
    }
    
    /* Quiz styles */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .quiz-progress { color: rgba(255,255,255,0.6); font-size: 14px; }
    .quiz-timer { 
      background: rgba(251, 146, 60, 0.2);
      color: #fb923c;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    .quiz-subject {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .subject-traffic { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .subject-geography { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    
    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ea580c, #fb923c);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    
    .question-type {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .type-tf { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }
    .type-mc { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
    
    .question-text {
      font-size: 18px;
      line-height: 1.7;
      color: #fff;
      margin-bottom: 24px;
    }
    
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      padding: 16px 20px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
    .option-btn.selected { background: rgba(251, 146, 60, 0.2); border-color: #fb923c; }
    .option-btn.correct { background: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #34d399; }
    .option-btn.wrong { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #f87171; }
    .option-btn:disabled { cursor: default; }
    
    .answer-feedback {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      font-size: 15px;
    }
    .feedback-correct { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #34d399; }
    .feedback-wrong { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; }
    
    .nav-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .nav-btn:hover { opacity: 0.9; }
    
    /* Result styles */
    .result-score {
      font-size: 72px;
      font-weight: 700;
      margin: 16px 0;
    }
    .result-pass { color: #34d399; }
    .result-fail { color: #f87171; }
    
    .result-badge {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .badge-pass { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .badge-fail { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    
    .score-breakdown {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .score-breakdown-title {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      margin-bottom: 16px;
      text-align: center;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .score-row:last-child { border-bottom: none; }
    .score-label { color: rgba(255,255,255,0.8); font-size: 15px; }
    .score-value { font-weight: 600; font-size: 18px; }
    .score-traffic { color: #60a5fa; }
    .score-geography { color: #34d399; }
    .score-average { color: #fb923c; font-size: 22px; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-box-correct { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }
    .stat-box-wrong { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
    .stat-number { font-size: 32px; font-weight: 700; }
    .stat-number-correct { color: #34d399; }
    .stat-number-wrong { color: #f87171; }
    .stat-label { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 4px; }
    
    .time-box {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 20px;
    }
    .time-text { color: rgba(255,255,255,0.7); font-size: 14px; }
    
    /* Review modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: #1c1917;
      border-radius: 20px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-title { font-size: 20px; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 28px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .modal-close:hover { color: #fff; }
    
    .review-item {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .review-item.correct { border-left: 3px solid #10b981; }
    .review-item.wrong { border-left: 3px solid #ef4444; }
    .review-question { font-size: 15px; line-height: 1.6; margin-bottom: 12px; }
    .review-answer { font-size: 14px; color: rgba(255,255,255,0.7); }
    .review-answer strong { color: #34d399; }
    .review-answer .user-wrong { color: #f87171; }
    
    @media (max-width: 500px) {
      .card { padding: 20px; }
      .city-grid { grid-template-columns: repeat(2, 1fr); }
      .question-text { font-size: 16px; }
      .result-score { font-size: 56px; }
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    // ===== 題庫資料 =====
    // 交通法令題庫 (從 traffic-law-quiz.html 載入)
    const trafficTrueFalse = [
      {id:1,question:"臨時停車係指車輛因上、下人、客、裝卸物品,其引擎未熄火,停止時間未滿10分鐘,保持立即行駛之狀態。",answer:false},
      {id:2,question:"為維護道路交通安全與暢通,警察機關於必要時,得指定某線道路禁止車輛通行。",answer:true},
      {id:3,question:"為維護道路交通安全與暢通,警察機關於必要時,得禁止停車及臨時停車。",answer:true},
      {id:4,question:"道路因遇突發事故,足使交通陷於停滯時,執行交通勤務之警察,得調撥車道讓車輛通行。",answer:true},
      {id:5,question:"違規停車之取締,不得由交通助理人員逕行執行之。",answer:false},
      {id:6,question:"汽車駕駛人闖平交道,不得逕行舉發。",answer:false},
      {id:7,question:"汽車駕駛人搶越行人穿越道,得逕行舉發。",answer:true},
      {id:8,question:"汽車駕駛人違規停車,經各級學校交通服務隊現場導護人員簽證檢舉者,得逕行舉發。",answer:true},
      {id:9,question:"汽車駕駛人聞救護車之警號不立即避讓者,得逕行舉發。",answer:true},
      {id:10,question:"經以科學儀器取得證據資料證明汽車駕駛人行為違規者,得逕行舉發。",answer:true},
      {id:11,question:"汽車駕駛人違規超車之行為,不得以移動式相機取得之證據,據以逕行舉發。",answer:false},
      {id:12,question:"汽車駕駛人未依規定變換車道之違規行為,不得以移動式相機取得之證據,據以逕行舉發。",answer:false},
      {id:13,question:"汽車駕駛人行車超速之違規行為,不得以移動式相機取得之證據,據以逕行舉發。",answer:false},
      {id:14,question:"汽車駕駛人未依規定繫安全帶之違規行為,不得以移動式相機取得之証據,據以逕行舉發。",answer:false},
      {id:15,question:"交通違規之受處罰人接獲違反道路交通管理事件通知單後,不服舉發事實者,應於30日內,向處罰機關陳述意見。",answer:true},
      {id:16,question:"交通違規之受處罰人未依通知所定期限前往指定處所聽候裁決,且未依規定期限繳納罰鍰結案者,處罰機關得逕行裁決之。",answer:true},
      {id:17,question:"汽車駕駛人未繳清其所有違反道路交通管理處罰條例之罰鍰前,不得向公路監理機關辦理各項登記。",answer:true},
      {id:18,question:"車輛駕駛人違反道路交通管理處罰條例,依法應負刑事責任者,一律移送該管地方法院檢察署處理。",answer:true},
      {id:19,question:"報廢登記之汽車仍行駛者,除罰鍰及禁止行駛外,其車輛並沒入之。",answer:true},
      {id:20,question:"變造汽車牌照,使不能辨認其牌號,處汽車所有人新臺幣2,400元以上,4,800元以下罰鍰,並責令申請換領牌照。",answer:true},
      {id:21,question:"塗改客車車身標明之載客人數,與原核定數量不符,處汽車所有人新臺幣2,400元以上,4,800元以下罰鍰,並責令改正。",answer:true},
      {id:22,question:"引擎號碼,與原登記位置不符,處汽車駕駛人新臺幣2,400元以上4,800元以下罰鍰,並責令申改正。",answer:false},
      {id:23,question:"牌照遺失,不報請公路主管機關補發,處汽車所有人新臺幣300元以上600元以下罰鍰,並可禁止其行駛。",answer:true},
      {id:24,question:"號牌污穢,非行車途中因遇雨、雪道路泥濘所致,處汽車所有人新臺幣300元以上600元以下罰鍰,並責令改正。",answer:true},
      {id:25,question:"計程車應裝置自動計費器、車頂燈、執業登記證插座,缺一不可。",answer:true},
      {id:26,question:"計程車不可在前、後兩邊玻璃門上黏貼不透明反光紙。",answer:true},
      {id:27,question:"汽車逾期2個月以上未參加定期檢驗者,除依規定罰鍰外,並吊扣其牌照,至檢驗合格後發還。",answer:false},
      {id:28,question:"汽車逾期6個月以上未參加定期檢驗者,除依規定罰鍰外,並註銷其牌照。",answer:true},
      {id:29,question:"經檢驗不合格之汽車,於3個月內仍未修復並申請覆驗,或覆驗仍不合格者,吊扣其牌照。",answer:false},
      {id:30,question:"汽車因交通事故遭受重大損壞修復後,應申請公路主管機關施行臨時檢驗。",answer:true},
      {id:31,question:"汽車所有人在1年內違反「應施行臨時檢驗」規定2次以上者,除依規定罰鍰外,並吊扣牌照3個月。",answer:true},
      {id:32,question:"駕駛執照業經吊銷、註銷仍駕車之違規,駕駛執照應扣繳之。",answer:true},
      {id:33,question:"駕駛執照吊扣期間駕車之違規,應吊銷其駕駛執照。",answer:true},
      {id:34,question:"汽車駕駛人闖越平交道,應接受道路交通安全講習。",answer:true},
      {id:35,question:"公路主管機關對於道路交通法規之重大修正,必要時得通知職業汽車駕駛人參加道路交通安全講習。",answer:true},
      {id:36,question:"汽車駕駛人違規,依規定需受講習,無故不到者處罰鍰。經再通知依限參加講習,逾期6個月以上仍不參加者,吊扣其駕駛執照6個月。",answer:true},
      {id:37,question:"職業汽車駕駛人,不依規定期限參加駕駛執照審驗,逾期半年以上者,逕行註銷其駕駛執照。",answer:false},
      {id:38,question:"因未參加駕駛執照審驗,經逕行註銷駕駛執照之職業汽車駕駛人,得申請換發同等車類之普通駕駛執照。",answer:true},
      {id:39,question:"在設有禁止變換車道線之路段,可以迴車載客。",answer:false},
      {id:40,question:"汽車駕駛人於行駛道路時,以手持方式使用行動電話、電腦或其他相類功能裝置進行撥接、通話、數據通訊或其他有礙駕駛安全之行為者,處新臺幣3,000元罰鍰。",answer:true}
    ];
    
    const trafficMultipleChoice = [
      {id:1,question:"下列何種燈號,車輛應減速接近,先停止於交岔路口前,讓幹道車優先通行後,認為安全時方得續行?",options:["閃光綠燈","閃光黃燈","閃光紅燈"],answer:3},
      {id:2,question:"交通違規案件駕駛人或行為人,收到違反道路交通管理事件通知單,若不服舉發事實者,應在幾日內,向處罰機關陳述意見?",options:["15日","30日","60日"],answer:2},
      {id:3,question:"牌照遺失,不報請公路主管機關補發,處汽車所有人罰鍰多少元?",options:["600-1,200元","300-600元","900-1,800元"],answer:2},

    // ===== 工具函數 =====
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    function formatTime(ms) {
      const mins = Math.floor(ms / 60000);
      const secs = Math.floor((ms % 60000) / 1000);
      return `${mins}分${secs}秒`;
    }

    // ===== 準備題目 =====
    function prepareQuestions(city) {
      let questions = [];
      
      // 交通法令：是非20題 + 選擇30題
      const trafficTF = shuffle(trafficTrueFalse).slice(0, 20).map(q => ({
        ...q,
        subject: 'traffic',
        type: 'tf'
      }));
      
      const trafficMC = shuffle(trafficMultipleChoice).slice(0, 30).map(q => ({
        ...q,
        subject: 'traffic',
        type: 'mc'
      }));
      
      // 地理環境：是非20題 + 選擇30題 (依選擇的城市篩選，或全部)
      let geoTFPool = geographyTrueFalse;
      let geoMCPool = geographyMultipleChoice;
      
      if (city && city !== 'all') {
        geoTFPool = geographyTrueFalse.filter(q => q.city === city);
        geoMCPool = geographyMultipleChoice.filter(q => q.city === city);
      }
      
      const geoTF = shuffle(geoTFPool).slice(0, 20).map(q => ({
        ...q,
        subject: 'geography',
        type: 'tf'
      }));
      
      const geoMC = shuffle(geoMCPool).slice(0, 30).map(q => ({
        ...q,
        subject: 'geography',
        type: 'mc'
      }));
      
      // 先出交通法令50題，再出地理環境50題
      questions = [...shuffle([...trafficTF, ...trafficMC]), ...shuffle([...geoTF, ...geoMC])];
      
      return questions;
    }
    
    // ===== 計算分數 =====
    function calculateScores() {
      let trafficCorrect = 0;
      let trafficTotal = 0;
      let geoCorrect = 0;
      let geoTotal = 0;
      
      state.questions.forEach((q, i) => {
        const userAnswer = state.answers[i];
        let isCorrect = false;
        
        if (q.type === 'tf') {
          isCorrect = (userAnswer === 0 && q.answer === true) || (userAnswer === 1 && q.answer === false);
        } else {
          isCorrect = userAnswer === (q.answer - 1);
        }
        
        if (q.subject === 'traffic') {
          trafficTotal++;
          if (isCorrect) trafficCorrect++;
        } else {
          geoTotal++;
          if (isCorrect) geoCorrect++;
        }
      });
      
      const trafficScore = Math.round((trafficCorrect / trafficTotal) * 100);
      const geoScore = Math.round((geoCorrect / geoTotal) * 100);
      const avgScore = Math.round((trafficScore + geoScore) / 2);
      
      return {
        trafficCorrect,
        trafficTotal,
        trafficScore,
        geoCorrect,
        geoTotal,
        geoScore,
        avgScore,
        totalCorrect: trafficCorrect + geoCorrect,
        totalQuestions: trafficTotal + geoTotal,
        passed: avgScore >= 70
      };
    }

      }
      
      // 判斷答案
      let correctIndex = q.type === 'tf' ? (q.answer ? 0 : 1) : (q.answer - 1);
      
      return `
        <div class="card">
          <div class="quiz-header">
            <span class="quiz-progress">第 ${state.currentIndex + 1} / ${state.questions.length} 題</span>
            <span class="quiz-timer" id="timer">00:00</span>
          </div>
          
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progress}%"></div>
          </div>
          
          <span class="quiz-subject ${subjectClass}">${subjectName}</span>
          <span class="question-type ${typeClass}">${typeName}</span>
          
          <div class="question-text">${q.question}</div>
          
          <div class="options">
            ${options.map((opt, i) => {
              let cls = 'option-btn';
              if (answered) {
                if (i === correctIndex) cls += ' correct';
                else if (state.answers[state.currentIndex] === i && i !== correctIndex) cls += ' wrong';
              } else if (state.answers[state.currentIndex] === i) {
                cls += ' selected';
              }
              return `<button class="${cls}" data-option="${i}" ${answered ? 'disabled' : ''}>${opt}</button>`;
            }).join('')}
          </div>
          
          ${answered ? `
            <div class="answer-feedback ${state.answers[state.currentIndex] === correctIndex ? 'feedback-correct' : 'feedback-wrong'}">
              ${state.answers[state.currentIndex] === correctIndex ? '✓ 答對了！' : `✗ 答錯了！正確答案：${options[correctIndex]}`}
            </div>
            <button class="nav-btn" id="nextBtn">
              ${state.currentIndex < state.questions.length - 1 ? '下一題 →' : '查看結果'}
            </button>
          ` : ''}
        </div>
      `;
    }
    
    function renderResult() {
      const scores = calculateScores();
      const duration = state.endTime - state.startTime;
      
      return `
        <div class="card center">
          <div class="icon-xlarge">${scores.passed ? '🎉' : '📚'}</div>
          <h2>考試完成！</h2>
          
          <div class="result-score ${scores.passed ? 'result-pass' : 'result-fail'}">${scores.avgScore}</div>
          <div class="result-badge ${scores.passed ? 'badge-pass' : 'badge-fail'}">
            ${scores.passed ? '✓ 考試通過' : '✗ 未通過'}
          </div>
          
          <div class="score-breakdown">
            <div class="score-breakdown-title">📊 各科成績</div>
            <div class="score-row">
              <span class="score-label">📜 交通法令</span>
              <span class="score-value score-traffic">${scores.trafficScore} 分 (${scores.trafficCorrect}/${scores.trafficTotal})</span>
            </div>
            <div class="score-row">
              <span class="score-label">🗺️ 地理環境</span>
              <span class="score-value score-geography">${scores.geoScore} 分 (${scores.geoCorrect}/${scores.geoTotal})</span>
            </div>
            <div class="score-row">
              <span class="score-label">📝 平均分數</span>
              <span class="score-value score-average">${scores.avgScore} 分</span>
            </div>
          </div>
          
          <div class="stats-grid">
            <div class="stat-box stat-box-correct">
              <div class="stat-number stat-number-correct">${scores.totalCorrect}</div>
              <div class="stat-label">答對題數</div>
            </div>
            <div class="stat-box stat-box-wrong">
              <div class="stat-number stat-number-wrong">${scores.totalQuestions - scores.totalCorrect}</div>
              <div class="stat-label">答錯題數</div>
            </div>
          </div>
          
          <div class="time-box">
            <span class="time-text">⏱️ 作答時間：${formatTime(duration)}</span>
          </div>
          
          <div style="margin-bottom: 16px; padding: 12px; background: ${scores.passed ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)'}; border-radius: 10px; border: 1px solid ${scores.passed ? 'rgba(16, 185, 129, 0.3)' : 'rgba(239, 68, 68, 0.3)'};">
            <span style="color: ${scores.passed ? '#34d399' : '#f87171'}; font-size: 14px;">
              ${scores.passed ? '🎉 恭喜！兩科平均達 70 分及格標準' : '⚠️ 兩科平均未達 70 分，請繼續努力！'}
            </span>
          </div>
          
          <div class="btn-group">
            <button class="btn-secondary" id="reviewBtn">查看答案</button>
            <button class="btn-secondary" id="wrongOnlyBtn" style="border-color: #ef4444; color: #f87171;">只看錯題</button>
          </div>
          
          <div class="btn-group">
            <button class="btn-secondary" id="menuBtn">返回選單</button>
            <button class="btn-primary" id="retryBtn" style="flex: 1;">再考一次</button>
          </div>
        </div>
      `;
    }
    
    // ===== 主渲染 =====
    function render() {
      const app = document.getElementById('app');
      
      if (state.screen === 'menu') {
        app.innerHTML = renderMenu();
      } else if (state.screen === 'quiz') {
        app.innerHTML = renderQuiz();
      } else if (state.screen === 'result') {
        app.innerHTML = renderResult();
      }
      
      attachEvents();
    }
    
    // ===== 計時器 =====
    let timerInterval;
    function startTimer() {
      state.startTime = Date.now();
      timerInterval = setInterval(() => {
        const el = document.getElementById('timer');
        if (el) {
          const elapsed = Date.now() - state.startTime;
          const m = Math.floor(elapsed / 60000);
          const s = Math.floor((elapsed % 60000) / 1000);
          el.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
      }, 1000);
    }
    
    function stopTimer() {
      state.endTime = Date.now();
      clearInterval(timerInterval);
    }
    
    // ===== 事件處理 =====
    function attachEvents() {
      // 城市選擇
      document.querySelectorAll('[data-city]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedCity = btn.dataset.city;
          render();
        });
      });
      
      // 開始考試
      const startBtn = document.getElementById('startBtn');
      if (startBtn) {
        startBtn.addEventListener('click', () => {
          state.questions = prepareQuestions(state.selectedCity);
          state.currentIndex = 0;
          state.answers = [];
          state.screen = 'quiz';
          render();
          startTimer();
        });
      }
      
      // 選項
      document.querySelectorAll('[data-option]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (state.answers[state.currentIndex] === undefined) {
            state.answers[state.currentIndex] = parseInt(btn.dataset.option);
            render();
          }
        });
      });
      
      // 下一題
      const nextBtn = document.getElementById('nextBtn');
      if (nextBtn) {
        nextBtn.addEventListener('click', () => {
          if (state.currentIndex < state.questions.length - 1) {
            state.currentIndex++;
            render();
          } else {
            stopTimer();
            state.screen = 'result';
            render();
          }
        });
      }
      
      // 返回選單
      const menuBtn = document.getElementById('menuBtn');
      if (menuBtn) {
        menuBtn.addEventListener('click', () => {
          state.screen = 'menu';
          state.selectedCity = null;
          render();
        });
      }
      
      // 再考一次
      const retryBtn = document.getElementById('retryBtn');
      if (retryBtn) {
        retryBtn.addEventListener('click', () => {
          state.questions = prepareQuestions(state.selectedCity);
          state.currentIndex = 0;
          state.answers = [];
          state.screen = 'quiz';
          render();
          startTimer();
        });
      }
      
      // 查看答案
      const reviewBtn = document.getElementById('reviewBtn');
      if (reviewBtn) {
        reviewBtn.addEventListener('click', () => showReview(false));
      }
      
      // 只看錯題
      const wrongOnlyBtn = document.getElementById('wrongOnlyBtn');
      if (wrongOnlyBtn) {
        wrongOnlyBtn.addEventListener('click', () => showReview(true));
      }
    }
    
    // ===== 查看答案 =====
    function showReview(wrongOnly) {
      const scores = calculateScores();
      let items = [];
      
      state.questions.forEach((q, i) => {
        const userAnswer = state.answers[i];
        let correctIndex = q.type === 'tf' ? (q.answer ? 0 : 1) : (q.answer - 1);
        let isCorrect = userAnswer === correctIndex;
        
        if (wrongOnly && isCorrect) return;
        
        let options = q.type === 'tf' ? ['○ 是', '╳ 否'] : q.options;
        
        items.push(`
          <div class="review-item ${isCorrect ? 'correct' : 'wrong'}">
            <div style="margin-bottom: 8px;">
              <span class="quiz-subject ${q.subject === 'traffic' ? 'subject-traffic' : 'subject-geography'}" style="font-size: 11px; padding: 2px 8px;">
                ${q.subject === 'traffic' ? '交通法令' : '地理環境'}
              </span>
              <span class="question-type ${q.type === 'tf' ? 'type-tf' : 'type-mc'}" style="font-size: 11px; padding: 2px 8px;">
                ${q.type === 'tf' ? '是非題' : '選擇題'}
              </span>
            </div>
            <div class="review-question">${i + 1}. ${q.question}</div>
            <div class="review-answer">
              正確答案：<strong>${options[correctIndex]}</strong>
              ${!isCorrect ? `<br>你的答案：<span class="user-wrong">${options[userAnswer] || '未作答'}</span>` : ''}
            </div>
          </div>
        `);
      });
      
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-content">
          <div class="modal-header">
            <span class="modal-title">${wrongOnly ? '錯題檢討' : '全部答案'} (${items.length}題)</span>
            <button class="modal-close" id="closeModal">×</button>
          </div>
          ${items.length > 0 ? items.join('') : '<p style="text-align:center; color: rgba(255,255,255,0.6); padding: 40px;">🎉 太棒了！沒有錯題</p>'}
        </div>
      `;
      
      document.body.appendChild(modal);
      
      document.getElementById('closeModal').addEventListener('click', () => {
        modal.remove();
      });
      
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.remove();
      });
    }
    
    // ===== 初始化 =====
    render();
  </script>
</body>
</html>
