<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模擬正式考試 - 計程車執業登記證</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; 
      min-height: 100vh; 
      background: linear-gradient(135deg, #1a365d 0%, #0f172a 50%, #1e293b 100%);
      color: #fff;
    }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px; min-height: 100vh; }
    .flex-center { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 550px;
    }
    
    .center { text-align: center; }
    .icon-large { font-size: 64px; margin-bottom: 16px; }
    .icon-xlarge { font-size: 80px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    h2 { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
    .subtitle { color: rgba(255,255,255,0.6); font-size: 15px; margin-bottom: 24px; }
    
    .info-box {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .info-box p { color: rgba(255,255,255,0.8); font-size: 14px; line-height: 1.8; }
    
    .exam-info {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .exam-info-title { 
      color: #60a5fa; 
      font-weight: 600; 
      font-size: 16px; 
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .exam-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .exam-info-item {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .exam-info-label { color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 4px; }
    .exam-info-value { color: #fff; font-size: 18px; font-weight: 600; }
    
    .btn-primary {
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .btn-secondary {
      flex: 1;
      padding: 14px 20px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    
    .btn-group { display: flex; gap: 12px; margin-top: 12px; }
    
    .section { margin-bottom: 24px; }
    .section-title {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    
    .city-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .city-btn {
      padding: 12px 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .city-btn:hover { background: rgba(255,255,255,0.1); }
    .city-btn.active { 
      background: rgba(16, 185, 129, 0.2); 
      border-color: #10b981; 
      color: #34d399;
    }
    
    /* Quiz styles */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .quiz-progress { color: rgba(255,255,255,0.6); font-size: 14px; }
    .quiz-timer { 
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    .quiz-subject {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .subject-traffic { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .subject-geography { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    
    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    
    .question-type {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .type-tf { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }
    .type-mc { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
    
    .question-text {
      font-size: 18px;
      line-height: 1.7;
      color: #fff;
      margin-bottom: 24px;
    }
    
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      padding: 16px 20px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
    .option-btn.selected { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
    .option-btn.correct { background: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #34d399; }
    .option-btn.wrong { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #f87171; }
    .option-btn:disabled { cursor: default; }
    
    .answer-feedback {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      font-size: 15px;
    }
    .feedback-correct { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #34d399; }
    .feedback-wrong { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; }
    
    .nav-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .nav-btn:hover { opacity: 0.9; }
    
    /* Result styles */
    .result-score {
      font-size: 72px;
      font-weight: 700;
      margin: 16px 0;
    }
    .result-pass { color: #34d399; }
    .result-fail { color: #f87171; }
    
    .result-badge {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .badge-pass { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .badge-fail { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    
    .score-breakdown {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .score-breakdown-title {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      margin-bottom: 16px;
      text-align: center;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .score-row:last-child { border-bottom: none; }
    .score-label { color: rgba(255,255,255,0.8); font-size: 15px; }
    .score-value { font-weight: 600; font-size: 18px; }
    .score-traffic { color: #60a5fa; }
    .score-geography { color: #34d399; }
    .score-average { color: #60a5fa; font-size: 22px; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-box-correct { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }
    .stat-box-wrong { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
    .stat-number { font-size: 32px; font-weight: 700; }
    .stat-number-correct { color: #34d399; }
    .stat-number-wrong { color: #f87171; }
    .stat-label { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 4px; }
    
    .time-box {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 20px;
    }
    .time-text { color: rgba(255,255,255,0.7); font-size: 14px; }
    
    /* Review modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      border-radius: 20px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-title { font-size: 20px; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 28px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .modal-close:hover { color: #fff; }
    
    .review-item {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .review-item.correct { border-left: 3px solid #10b981; }
    .review-item.wrong { border-left: 3px solid #ef4444; }
    .review-question { font-size: 15px; line-height: 1.6; margin-bottom: 12px; }
    .review-answer { font-size: 14px; color: rgba(255,255,255,0.7); }
    .review-answer strong { color: #34d399; }
    .review-answer .user-wrong { color: #f87171; }
    
    @media (max-width: 500px) {
      .card { padding: 20px; }
      .city-grid { grid-template-columns: repeat(2, 1fr); }
      .question-text { font-size: 16px; }
      .result-score { font-size: 56px; }
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    // ===== 交通法令題庫 =====
        const trafficTrueFalse = [
      { id: 1, question: "臨時停車係指車輛因上、下人、客、裝卸物品,其引擎未熄火,停止時間未滿10分鐘,保持立即行駛之狀態。", answer: false },
      { id: 2, question: "為維護道路交通安全與暢通,警察機關於必要時,得指定某線道路禁止車輛通行。", answer: true },
      { id: 3, question: "為維護道路交通安全與暢通,警察機關於必要時,得禁止停車及臨時停車。", answer: true },
      { id: 4, question: "道路因遇突發事故,足使交通陷於停滯時,執行交通勤務之警察,得調撥車道讓車輛通行。", answer: true },
      { id: 5, question: "違規停車之取締,不得由交通助理人員逕行執行之。", answer: false },
      { id: 6, question: "汽車駕駛人闖平交道,不得逕行舉發。", answer: false },
      { id: 7, question: "汽車駕駛人搶越行人穿越道,得逕行舉發。", answer: true },
      { id: 8, question: "汽車駕駛人違規停車,經各級學校交通服務隊現場導護人員簽證檢舉者,得逕行舉發。", answer: true },
      { id: 9, question: "汽車駕駛人聞救護車之警號不立即避讓者,得逕行舉發。", answer: true },
      { id: 10, question: "經以科學儀器取得證據資料證明汽車駕駛人行為違規者,得逕行舉發。", answer: true },
      { id: 11, question: "汽車駕駛人違規超車之行為,不得以移動式相機取得之證據,據以逕行舉發。", answer: false },
      { id: 12, question: "汽車駕駛人未依規定變換車道之違規行為,不得以移動式相機取得之證據,據以逕行舉發。", answer: false },
      { id: 13, question: "汽車駕駛人行車超速之違規行為,不得以移動式相機取得之證據,據以逕行舉發。", answer: false },
      { id: 14, question: "汽車駕駛人未依規定繫安全帶之違規行為,不得以移動式相機取得之証據,據以逕行舉發。", answer: false },
      { id: 15, question: "交通違規之受處罰人接獲違反道路交通管理事件通知單後,不服舉發事實者,應於30日內,向處罰機關陳述意見。", answer: true },
      { id: 16, question: "交通違規之受處罰人未依通知所定期限前往指定處所聽候裁決,且未依規定期限繳納罰鍰結案者,處罰機關得逕行裁決之。", answer: true },
      { id: 17, question: "汽車駕駛人未繳清其所有違反道路交通管理處罰條例之罰鍰前,不得向公路監理機關辦理各項登記。", answer: true },
      { id: 18, question: "車輛駕駛人違反道路交通管理處罰條例,依法應負刑事責任者,一律移送該管地方法院檢察署處理。", answer: true },
      { id: 19, question: "報廢登記之汽車仍行駛者,除罰鍰及禁止行駛外,其車輛並沒入之。", answer: true },
      { id: 20, question: "變造汽車牌照,使不能辨認其牌號,處汽車所有人新臺幣2,400元以上,4,800元以下罰鍰,並責令申請換領牌照。", answer: true },
      { id: 21, question: "塗改客車車身標明之載客人數,與原核定數量不符,處汽車所有人新臺幣2,400元以上,4,800元以下罰鍰,並責令改正。", answer: true },
      { id: 22, question: "引擎號碼,與原登記位置不符,處汽車駕駛人新臺幣2,400元以上4,800元以下罰鍰,並責令申改正。", answer: false },
      { id: 23, question: "牌照遺失,不報請公路主管機關補發,處汽車所有人新臺幣300元以上600元以下罰鍰,並可禁止其行駛。", answer: true },
      { id: 24, question: "號牌污穢,非行車途中因遇雨、雪道路泥濘所致,處汽車所有人新臺幣300元以上600元以下罰鍰,並責令改正。", answer: true },
      { id: 25, question: "計程車應裝置自動計費器、車頂燈、執業登記證插座,缺一不可。", answer: true },
      { id: 26, question: "計程車不可在前、後兩邊玻璃門上黏貼不透明反光紙。", answer: true },
      { id: 27, question: "汽車逾期2個月以上未參加定期檢驗者,除依規定罰鍰外,並吊扣其牌照,至檢驗合格後發還。", answer: false },
      { id: 28, question: "汽車逾期6個月以上未參加定期檢驗者,除依規定罰鍰外,並註銷其牌照。", answer: true },
      { id: 29, question: "經檢驗不合格之汽車,於3個月內仍未修復並申請覆驗,或覆驗仍不合格者,吊扣其牌照。", answer: false },
      { id: 30, question: "汽車因交通事故遭受重大損壞修復後,應申請公路主管機關施行臨時檢驗。", answer: true },
      { id: 31, question: "汽車所有人在1年內違反「應施行臨時檢驗」規定2次以上者,除依規定罰鍰外,並吊扣牌照3個月。", answer: true },
      { id: 32, question: "駕駛執照業經吊銷、註銷仍駕車之違規,駕駛執照應扣繳之。", answer: true },
      { id: 33, question: "駕駛執照吊扣期間駕車之違規,應吊銷其駕駛執照。", answer: true },
      { id: 34, question: "汽車駕駛人闖越平交道,應接受道路交通安全講習。", answer: true },
      { id: 35, question: "公路主管機關對於道路交通法規之重大修正,必要時得通知職業汽車駕駛人參加道路交通安全講習。", answer: true },
      { id: 36, question: "汽車駕駛人違規,依規定需受講習,無故不到者處罰鍰。經再通知依限參加講習,逾期6個月以上仍不參加者,吊扣其駕駛執照6個月。", answer: true },
      { id: 37, question: "職業汽車駕駛人,不依規定期限參加駕駛執照審驗,逾期半年以上者,逕行註銷其駕駛執照。", answer: false },
      { id: 38, question: "因未參加駕駛執照審驗,經逕行註銷駕駛執照之職業汽車駕駛人,得申請換發同等車類之普通駕駛執照。", answer: true },
      { id: 39, question: "在設有禁止變換車道線之路段,可以迴車載客。", answer: false },
      { id: 40, question: "汽車駕駛人於行駛道路時,以手持方式使用行動電話、電腦或其他相類功能裝置進行撥接、通話、數據通訊或其他有礙駕駛安全之行為者,處新臺幣3,000元罰鍰。", answer: true },
      { id: 41, question: "汽車於高速公路行駛,未保持安全距離,處汽車駕駛人新臺幣3,000元以上6,000元以下罰鍰。", answer: true },
      { id: 42, question: "汽車於高速公路行駛,未依規定使用路肩,處汽車駕駛人新臺幣3,000元以上6,000元以下罰鍰。", answer: true },
      { id: 43, question: "汽車於高速公路行駛,佔用超車道致堵塞超車道行車者,處汽車駕駛人新臺幣6,000元以上1萬2,000元以下罰鍰。", answer: true },
      { id: 44, question: "計程車司機已善盡告知義務後,乘客沒有依規定繫安全帶時,依規定是處罰該乘客。", answer: true },
      { id: 45, question: "計程車內黏貼有交通部製作的「請繫妥安全帶」告知標語貼紙,或者是計程車司機另以其他相關文字、圖畫或以口頭、語音等各種方式提醒乘客注意依規定繫安全帶後,都已經符合計程車司機已善盡告知義務的規定。", answer: true },
      { id: 46, question: "計程車司機盡到告知義務後,乘客繫不繫安全帶就是乘客自己要負責,與計程司機朋友沒有關係;如果遇到不願意繫安全帶的乘客,司機朋友不要動氣,也沒有必要跟乘客爭執。", answer: true },
      { id: 47, question: "計程車駕駛人,未向公路主管機關辦理執業登記,領取執業登記證,即行執業者,處新臺幣1,500元以上3,600元以下罰鍰。", answer: false },
      { id: 48, question: "計程車駕駛人,不依規定辦理執業登記,經處罰仍不辦理者,吊銷其駕駛執照。", answer: true },
      { id: 49, question: "計程車駕駛人,不依規定期限,參加年度查驗者,依規定罰鍰,逾期3個月以上仍不辦理者,廢止其執業登記。", answer: false },
      { id: 50, question: "計程車駕駛人經依道路交通管理處罰條例第36條第4項規定廢止執業登記者,未滿2年不得再行辦理執業登記。", answer: false },
      { id: 51, question: "計程車執業登記證,未依規定安置車內指定之插座者,處新臺幣1,500元罰鍰。", answer: true },
      { id: 52, question: "合格之計程車駕駛人,不論犯何種罪,均需俟有罪判決確定後才可吊扣或廢止其執業登記證。", answer: false },
      { id: 53, question: "計程車駕駛人經廢止執業登記者,其執業登記證由公路主管機關收繳之。", answer: false },
      { id: 54, question: "汽車駕駛人於公路車站攬客營運,並不違反規定。", answer: false },
      { id: 55, question: "計程車駕駛人任意拒載乘客者,處新臺幣600元以上1,200元以下罰鍰。", answer: true },
      { id: 56, question: "計程車駕駛人故意繞道行駛者,處新臺幣600元以上1,200元以下罰鍰。", answer: true },
      { id: 57, question: "汽車駕駛人駕駛汽車行經行人穿越道時,行人應暫停讓車輛先行通過。", answer: false },
      { id: 58, question: "汽車駕駛人交會時,在峻狹坡路,上坡車未讓下坡車先行者,應處罰鍰。", answer: false },
      { id: 59, question: "汽車駕駛人在前行車之左側超車者,應處罰鍰。", answer: false },
      { id: 60, question: "汽車駕駛人轉彎時,直行車不讓轉彎車先行者,應處罰鍰。", answer: false },
      { id: 61, question: "汽車駕駛人轉彎時,除禁止行人穿越路段外,不暫停讓行人優先通行者,應處罰鍰。", answer: true },
      { id: 62, question: "在禁止左轉路段,因未設禁止迴車標誌,故汽車駕駛人迴車並不違反規定。", answer: false },
      { id: 63, question: "汽車駕駛人行經有燈光號誌管制之交岔路紅燈右轉者,並無處罰規定。", answer: false },
      { id: 64, question: "汽車駕駛人因前方路段塞車,為趕時間可在鐵路平交道倒車。", answer: false },
      { id: 65, question: "汽車駕駛人因洽商急事且短時間即可結束,得在快車道臨時停車。", answer: false },
      { id: 66, question: "汽車駕駛人在交岔路口10公尺內臨時停車者,應處罰鍰。", answer: true },
      { id: 67, question: "汽車駕駛人因找不到停車位且須洽商急事,得在消防車出、入口5公尺內臨時停車者。", answer: false },
      { id: 68, question: "汽車駕駛人駕駛汽車發生故障不能行駛,不設法移置於無礙交通之處者,應處罰鍰。", answer: true },
      { id: 69, question: "汽車駕駛人駕駛汽車發生故障不能行駛,於移置前,依規定在車輛前、後適當距離樹立車輛故障標誌,事後不除去者,並無處罰規定。", answer: false },
      { id: 70, question: "汽車駕駛人利用汽車犯罪,在判決確定前,得視情形暫扣其駕駛執照,禁止其駕駛。", answer: true },
      { id: 71, question: "肇事致人受傷案件,將肇事汽車標繪後,即可移置不妨礙交通之處所,不須經當事人同意。", answer: false },
      { id: 72, question: "處罰條例之處罰,其為吊扣車輛牌照者,因處分後該車輛所有權移轉得免於執行。", answer: false },
      { id: 73, question: "汽車駕駛人違反停車規定,經舉發後,不遵守交通勤務警察責令改正者,得連續舉發之。", answer: true },
      { id: 74, question: "逕行舉發汽車行車速度超過規定之最高速限之情形,其違規行駛經過一個路口以上者,得連續舉發。", answer: true },
      { id: 75, question: "計程車駕駛人違反道路交通管理事件,受吊扣執業登記證,而未將執業登記證送交其辦理執業登記之警察機關者,當場暫代保管其計程車駕駛人執業登記證。", answer: true },
      { id: 76, question: "小型汽車內外車道均可行駛,行駛速度較慢時,應在內側車道行駛,但不得任意變換車道行駛。", answer: false },
      { id: 77, question: "小型車臨時停車應依車輛順行方向緊靠道路右側,其右側前後輪胎外距離緣石或路面邊緣不得逾60公分。", answer: true },
      { id: 78, question: "小型車臨時停車應依車輛順行方向緊靠道路右側,但單行道可左側臨時停車。", answer: true },
      { id: 79, question: "不可在劃有分向限制線路段迴車。", answer: true },
      { id: 80, question: "不可在禁止超車線、禁止變換車道線之路段迴車。", answer: true },
      { id: 81, question: "右轉彎時,應距交岔路口30公尺前顯示方向燈或手勢,駛至路口後再行右轉。", answer: true },
      { id: 82, question: "四車道以上道路,其設有劃分島劃分快慢車道,在慢車道上行駛之車輛不得左轉。", answer: true },
      { id: 83, question: "左右轉彎車不可佔用直行車車道暫停,致妨礙直行車通行。", answer: true },
      { id: 84, question: "由同向二車道進入一車道,應讓直行車道之車輛先行,無直行車道者,外車道之車輛應讓內車道之車輛先行。", answer: true },
      { id: 85, question: "違反道路交通管理事件吊銷駕駛執照處分者,併吊銷其執業登記證。", answer: true },
      { id: 86, question: "申請個人車行應連續持有有效之計程車駕駛人執業登記證6年以上者。", answer: true },
      { id: 87, question: "申請個人計程車行者之資格:年齡需在30歲以上,65歲以下,連續持有有效之執業登記證6年以上。", answer: true },
      { id: 88, question: "申請個人經營計程車客運業者,不得兼營其他汽車運輸業或受僱於其他運輸業。", answer: true },
      { id: 89, question: "交岔路口、公共汽車招呼站15公尺內,不得臨時停車。", answer: false },
      { id: 90, question: "交岔路口中設置黃色網狀線,係告示汽車駕駛人禁止於網狀線區域內臨時停車。", answer: true },
      { id: 91, question: "車輛行至有「讓」標誌路口,可不必停等讓車,逕行通過。", answer: false },
      { id: 92, question: "交岔路口有警察指揮,又有燈光號誌,應以燈光號誌為準。", answer: false },
      { id: 93, question: "交岔路口無警察指揮,又無燈光號誌,如兩路均為支線道,或幹道時,左方車應讓右方車先行。", answer: true },
      { id: 94, question: "交通違規行為,自行為成立之日起,超過1個月不得舉發。", answer: false },
      { id: 95, question: "交通標誌中八角型紅底白字「停」,意表駕駛人應停車觀察,認為安全時,方得再開。", answer: true },
      { id: 96, question: "因雨、霧視線不清或道路上臨時發生障礙,應減速慢行。", answer: true },
      { id: 97, question: "在山路行車,靠山壁車輛,應讓道路道路外緣車優先通過。", answer: true },
      { id: 98, question: "在公車招呼站10公尺內,不得停車,但可臨時停車不超過3分鐘。", answer: false },
      { id: 99, question: "在市區或交通頻繁處,汽車向同一方向行駛時,前車與後車應保持隨時可以煞停之距離。", answer: true },
      { id: 100, question: "在交岔路口、公共汽車招呼站10公尺內或消防車出、入口5公尺內得臨時停車。", answer: false },
      { id: 101, question: "在交岔路口有紅綠燈號誌及交通警察指揮時,以警察指揮為主。", answer: true },
      { id: 102, question: "在設有快慢車道分隔線之慢車道上,時速不得超過40公里。", answer: true },
      { id: 103, question: "在禁止左轉路段迴車者,處吊扣駕駛執照1個月。", answer: false },
      { id: 104, question: "在路邊劃有停放車輛線之處所停車營業者,處新臺幣600元以上1200元以下罰鍰。", answer: true },
      { id: 105, question: "在鐵路平交道可做為超車、迴車、倒車、臨時停車或停車。", answer: false },
      { id: 106, question: "如遇老幼婦孺在行人穿越道上行動緩慢,應按鳴喇叭促其快步通過。", answer: false },
      { id: 107, question: "行車速度,依標誌或標線之規定,無標誌或標線者,在市區道路時速不得超過50公里,在郊區道路時速不得超過60公里。", answer: false },
      { id: 108, question: "行車速度在無速限標誌標線且設有快慢車道分隔線之慢車道,時速不得超過50公里。", answer: false },
      { id: 109, question: "行近無號誌之圓環路口應讓已進入圓環之車輛先行。", answer: true },
      { id: 110, question: "汽車未依規定參加定期檢驗者,逾期1個月以上者吊扣其牌照。", answer: true },
      { id: 111, question: "汽車未依規定參加定期檢驗者,逾期6個月以上者,註銷其牌照。", answer: true },
      { id: 112, question: "汽車在迴轉時,應暫停並顯示左轉燈光或手勢,看清確無來往車輛並注意行人通過,始得迴轉。", answer: true },
      { id: 113, question: "汽車在雙向二車道行駛時,在劃有行車分向線之路段,在超車時可以超越,但不得併行競駛。", answer: true },
      { id: 114, question: "汽車在彎路、坡路、狹路、橋樑、隧道、鐵路平交道等處,不得迴車。", answer: true },
      { id: 115, question: "汽車駕駛人可於鐵路、公路車站或其他交通頻繁處所違規攬客營運。", answer: false },
      { id: 116, question: "汽車駕駛人行經多車道之圓環,應讓內側車道之車輛先行。", answer: true },
      { id: 117, question: "汽車駕駛人行經有燈光號誌管制之交岔路口闖紅燈者,處新臺幣1,800元以上3,600元以下罰鍰。", answer: false },
      { id: 118, question: "汽車駕駛人於公路車站或其他交通頻繁處所違規攬客營運,處新臺幣1,500元以上3,000元以下罰鍰。", answer: true },
      { id: 119, question: "汽車駕駛人連續駕車超過8小時,如應歸責於汽車所有人者,吊扣其汽車牌照3個月。", answer: true },
      { id: 120, question: "汽車駕駛人僅需具有優良駕駛技術,不需具備急救的常識和技能。", answer: false },
      { id: 121, question: "汽車駕駛人駕駛汽車,行經泥濘或積水道路,不減速慢行,致污濕他人身體、衣物者處新臺幣600元以上1,800元以下罰鍰。", answer: true },
      { id: 122, question: "汽車駕駛人駕駛汽車違反道路交通安全規則,因而肇事致人受傷者,記違規點數3點。", answer: true },
      { id: 123, question: "汽車駕駛人任意駛出邊線,或任意跨越兩條車道行駛處新臺幣600元以上1,200元以下罰鍰。", answer: false },
      { id: 124, question: "汽車駕駛人在6個月內,違規記點共達6點以上者,吊扣駕駛執照2個月。", answer: false },
      { id: 125, question: "汽車駕駛人在半年內,違規記點共達6點以上者,應施予道路交通安全講習。", answer: false },
      { id: 126, question: "汽車駕駛人利用汽車犯罪,經判決有期徒刑以上之刑確定者,吊銷其駕駛執照。", answer: true },
      { id: 127, question: "汽車駕駛人於行駛道路時,使用手持式行動電話進行撥接或通話者處新臺幣3,000元罰鍰。", answer: true },
      { id: 128, question: "汽車駕駛人於行駛道路遇紅燈或塞車時,可使用手持式行動電話進行撥接或通話。", answer: false },
      { id: 129, question: "汽車駕駛人違規不依規定繳納罰鍰者,得以易處吊扣牌照或駕照。", answer: false },
      { id: 130, question: "曾犯恐嚇取財罪,經判決拘役,但易科罰金者,即可報考計程車駕駛人執業登記證。", answer: false },
      { id: 131, question: "汽車駕駛人駕駛汽車,行近鐵路平交道,應即將時速減低至15公里以下。", answer: true },
      { id: 132, question: "車行僱用無執業登記證之人駕駛計程車可處新臺幣9,000元罰鍰。", answer: true },
      { id: 133, question: "為了避免執業登記證遺失、褪色等麻煩,可自行影印登記證放置指定插座內營業。", answer: false },
      { id: 134, question: "為維護自身安全,計程車駕駛人載客至郊區或偏遠地區時,到達目的地後不要熄滅大燈或引擎,並隨時保持上路狀態,以便及時反應。", answer: true },
      { id: 135, question: "為避免陽光直射及冷氣外洩,可在車窗或擋風玻璃上粘貼反光紙。", answer: false },
      { id: 136, question: "計程車內裝設計費錶不可擅自更動,亦不得停止使用及逾額收費。", answer: true },
      { id: 137, question: "計程車在設有停車上客處標誌之路段,應在指定之上客處搭載乘客,不得沿途攬載。", answer: true },
      { id: 138, question: "計程車客運業由其駕駛人自備車輛參與經營者,應與駕駛人就權利義務事項預定公平合理之書面契約。", answer: true },
      { id: 139, question: "計程車為了增加收入,可以在車輛車身上張貼廣告,車頂廣告架不需檢驗就可以安裝上路。", answer: false },
      { id: 140, question: "計程車計費表之檢定、檢查機關是經濟部標準檢驗局。", answer: true },
      { id: 141, question: "計程車計費表因損壞須修理時,應於修理完成後駛往當地度量衡檢定機構申請複檢。", answer: true },
      { id: 142, question: "計程車計費表為應經檢定法定度量衡器,必須經檢定合格,並附加合格印證,才可以使用。", answer: true },
      { id: 143, question: "計程車執業登記證未依規定安置車內指定之插座者,處新臺幣1,500元罰鍰。", answer: true },
      { id: 144, question: "計程車發生故障不能行駛,不設法移置於無礙交通之處或於移置前,未依規定在車輛前、後適當地點樹立車輛故障標誌或事後不除去者,處新臺幣1,500元以上3,000元以下罰鍰。", answer: true },
      { id: 145, question: "計程車執業登記證以他物遮蔽者,處新臺幣3,000元罰鍰。", answer: false },
      { id: 146, question: "計程車駕駛人未向警察機關辦理執業登記,即行執業者,處新臺幣1,500元以上3,600元以下之罰鍰。", answer: true },
      { id: 147, question: "在狹窄坡路,上坡車應讓下坡車先行。", answer: false },
      { id: 148, question: "計程車載客,於火車站等處所前,如設有計程車招呼站,則計程車於下客後,可就地再搭載其他乘客營運。", answer: false },
      { id: 149, question: "計程車駕駛人受僱更動,應於15日內申報車行異動。", answer: true },
      { id: 150, question: "計程車駕駛人載客駛離營業區外,抵達目的地後應立即折返,並可於中途攬載乘客。", answer: false },
      { id: 151, question: "計程車駕駛人執業登記事項,如有異動應於事實發生後20日內,持有關證明文件向原發證警察機關辦理異動申報。", answer: false },
      { id: 152, question: "計程車應於車身兩側後門加漆號牌及公司行號或個人名稱,後窗玻璃亦須加漆牌照號碼。", answer: true },
      { id: 153, question: "計程駕駛人任意拒載乘客或故意繞道行駛者,處新臺幣900元以上至1,200元以下罰鍰。", answer: false },
      { id: 154, question: "執業登記證及其副證應檢同國民身分證、職業駕駛執照及執業事實證明文件，於每年出生月份之前後一個月內，至原發證之警察機關查驗。", answer: true },
      { id: 155, question: "閃光號誌路口,號誌閃紅燈方向為幹道,號誌閃黃燈方向為支道。", answer: false },
      { id: 156, question: "汽車號牌污穢、不洗刷清楚或為他物遮蔽,非行車途中因遇雨、雪道路泥濘所致者,處新臺幣300元以上600元以下罰鍰,並責令改正或禁止行駛。", answer: true },
      { id: 157, question: "路邊劃有停放車輛線之處所不得停車營業。", answer: true },
      { id: 158, question: "駕車不依規定通過行人穿越道,致使行人傷亡時,依法應負刑責者加重其刑三分之一。", answer: false },
      { id: 159, question: "駕駛人見消防車、救護車等警號不立即避讓,應處罰鍰及記違規點數2點之處分。", answer: false },
      { id: 160, question: "駕駛汽車肇事,無人受傷或死亡且車輛尚能行駛,應儘速將車輛位置標繪移置路邊,才不致影響交通。", answer: true },
      { id: 161, question: "駕駛人受僱車行如有變更,應於10日內辦理執業登記證異動申報。", answer: false },
      { id: 162, question: "駕駛汽車行經泥濘或積水道路,不減速慢行,致污濕他人身體、衣物者,處新臺幣600元以上1,800元以下罰鍰。", answer: true },
      { id: 163, question: "計程車不得懸掛窗簾或黏貼不透明之色紙或隔熱紙。", answer: true },
      { id: 164, question: "計程車駕駛人停止執業繳回執業登記證者,保留其執業資格1年,逾期須重新辦理。", answer: false },
      { id: 165, question: "除年滿65歲者須每年換發新證至年滿70歲外，執業登記證每3年換發1次，執業登記證屆期未換發者，失其效力，計程車駕駛人應重新申請辦理執業登記，始得執業。", answer: true },
      { id: 166, question: "計程車駕駛人執業登記事項如有異動,應於事實發生後20日內持有關證明文件向原發證警察機關辦理申報異動。", answer: false },
      { id: 167, question: "計程車駕駛人新領或換發執業登記證後,距年度查驗期間未滿半年者,得隔年再行辦理。", answer: true },
      { id: 168, question: "職業汽車駕駛人得憑因逾期審驗被註銷之職業駕駛執照,申請換發同等車類之普通駕駛執照。", answer: true },
      { id: 169, question: "職業駕駛人之駕駛執照,應自發照之日起,每滿3年審驗1次,並於審驗日期前後1個月內向監理單位申請審驗。", answer: true },
      { id: 170, question: "職業駕駛自發照之日起每滿2年至監理機關審驗1次,年滿60歲(以上)仍繼續執業者得每年檢具合格體檢表換領1年之有效職業駕照,最高至年滿70歲止。", answer: false },
      { id: 171, question: "轉彎車應讓直行車輛先行,但直行車尚未進入交岔路口,而轉彎車輛己達中心處開始轉彎,直行車應讓轉彎車先行。", answer: false },
      { id: 172, question: "闖紅燈或平交道當場不能或不宜攔截掣單舉發者,得逕行舉發之。", answer: true },
      { id: 173, question: "駕車起步進入車道或變換車道前,應先顯示方向燈,注視後視鏡及頭部擺動查看隔鄰車道車輛動態,藉以消除後視鏡之盲區。", answer: true },
      { id: 174, question: "車輛所有人、駕駛人,接獲違反道路交通管理事件通知單後,於30日內得不經裁決,逕依罰鍰基準規定,向指定處所繳納結案。", answer: true },
      { id: 175, question: "在山路行車靠山壁車未讓道路外緣車優先通過者,處以罰鍰。", answer: true },
      { id: 176, question: "汽車駕駛人在快車道依規定駕車行駛,因行人或慢車不依規定,擅自進入快車道,而致人受傷或死亡,依法應負刑事責任者,減輕其刑。", answer: true },
      { id: 177, question: "在未劃設車道線、行車分向線或分向限制線之道路,或設有快慢車道分隔線之慢車道,時速不得超過30公里。", answer: false },
      { id: 178, question: "汽車行駛於雙向二車道,在劃有行車分向線之路段,超車時得駛越,但不能併行競駛。", answer: true },
      { id: 179, question: "汽車在雙向二車道行駛時,在劃有分向限制線之路段,可以在該路段駛入對方來車之車道內。", answer: false },
      { id: 180, question: "汽車行駛至交岔路口,其行進轉彎,遇有交通指揮人員指揮與燈光號誌並用時,以交通指揮人員之指揮為準。", answer: true },
      { id: 181, question: "車輛除行駛於單行道外,均應靠右行駛,但遇有特殊情況,必須行駛左側道路時,應減速慢行,並注意前方來車及行人。", answer: true },
      { id: 182, question: "汽車行經多車道之圓環,應讓外側車道之車輛先行。", answer: false },
      { id: 183, question: "欲超越同一車道之前車時,須先鳴喇叭兩單響或變換燈光一次,俟前車減速靠邊,或以手勢表示允讓後,始得超越。", answer: true },
      { id: 184, question: "汽車行駛至交岔路口欲左轉彎時,應距交岔路口20公尺前顯示方向燈或手勢,行達交岔路口中心處左轉,並不得佔用來車道搶先左轉。", answer: false },
      { id: 185, question: "交岔路口有交通指揮人員指揮,又有燈光號誌,應以燈光號誌為準。", answer: false },
      { id: 186, question: "在設有劃分島劃分快慢車道,在慢車道上行駛之車輛,不得右轉。", answer: false },
      { id: 187, question: "汽車在同一車道行駛時,前車如須減速暫停,駕駛人應預先顯示燈光或手勢告知後車。", answer: true },
      { id: 188, question: "汽車在中途發生故障,無法移置於不妨礙交通處所時,如在市區道路,閃亮左右方或左方之方向燈即可,無需設置車輛故障標誌。", answer: false },
      { id: 189, question: "汽車駕駛人拒絕接受酒精測試之檢定,處新臺幣18萬元罰鍰。", answer: true },
      { id: 190, question: "汽車駕駛人於行駛道路時,使用手持式行動電話進行撥接或通話,處新臺幣3000元罰鍰。", answer: true },
      { id: 191, question: "計程車未依規定裝置車頂燈者,處汽車所有人新臺幣900元以上1,800元以下罰鍰。", answer: true },
      { id: 192, question: "計程車在前、後兩邊玻璃門上黏貼不透明反光紙者,處汽車所有人新臺幣900元以上1,800元以下罰鍰。", answer: true },
      { id: 193, question: "聞消防車、救護車、警備車之警號，不立即避讓者，處新臺幣3,600元罰鍰，並吊銷駕駛執照。", answer: true },
      { id: 194, question: "最近3年內曾依道路交通管理處罰條例受違規記點者,不准申辦個人經營計程客運業。", answer: true },
      { id: 195, question: "撞傷正執行交通勤務中之警察者,吊扣駕駛執照6個月。", answer: false },
      { id: 196, question: "駕車行近行人穿越道,有行人穿越時,不暫停讓行人先行通過者,處新臺幣600元以上1,800元以下罰鍰。", answer: false },
      { id: 197, question: "汽車駕駛人駕駛汽車肇事致人受傷或死亡,應即採取救護或其他必要措施,並向警察機關報告,不得駛離;逃逸者吊銷駕駛執照。", answer: true },
      { id: 198, question: "車輛駕駛人行經鐵路平交道,遮斷器已開始放下,或警鈴已響、閃光號誌已顯示,仍強行闖越者,因而肇事者,吊銷其駕駛執照。", answer: true },
      { id: 199, question: "計程車駕駛人越區載客營業,依公路法由公路監理機關單位處新臺幣9,000元以上9萬元以下罰鍰,並得按其情節吊扣牌照1至3個月。", answer: true },
      { id: 200, question: "計程車辦理執業登記前,應接受執業相關法令及執業地之地理環境、道路狀況測驗,測驗成績以滿60分為及格。", answer: false },
      { id: 201, question: "聞消防車、救護車、警備車、工程救險車之警號時,應在原車道慢速行駛。", answer: false },
      { id: 202, question: "依道路交通安全規則規定,考領職業駕駛執照須年滿20歲、最高不得超過65歲。", answer: true },
      { id: 203, question: "在市區交通頻繁處,汽車在同一方向行駛時,前車與後車應保持二車以上之距離。", answer: false },
      { id: 204, question: "行駛高速公路時,如發生緊急情況無法繼續行駛時,應滑離車道,在路肩上停車待援。", answer: true },
      { id: 205, question: "在高速公路最高速限每小時90公里以上之路段,行駛速率低於每小時80公里之小型較慢速車輛,應行駛於外側車道。但得暫時利用緊鄰外側車道之車道超越前車。", answer: true },
      { id: 206, question: "汽車行駛高速公路及快速公路前，應妥為檢查車輛，在行駛途中不得有下列情形：四輪以上汽車的輪胎胎面磨損至中華民國國家標準 CNS 1431汽車用外胎（輪胎）標準或CNS4959卡客車用翻修輪胎標準所訂之任一胎面磨耗指示點。", answer: true },
      { id: 207, question: "小型車行駛高速公路之車輛與前車應保持足夠安全距離,車速每小時60公里時保持30公尺以上距離,車速每小時90公里應保持45公尺以上距離。", answer: true },
      { id: 208, question: "因隧道內車道壅塞,可變換至較少車輛之車道行駛,以紓解車流量。", answer: false },
      { id: 209, question: "汽車在隧道內遇事故時,儘可能將車輛停放於路邊設置之緊急停車彎,並開啟危險警告燈。", answer: true },
      { id: 210, question: "行經長隧道,當交通壅塞或發生緊急事故時,應利用車行聯絡隧道逕行迴車,趕快駛離現場。", answer: false },
      { id: 211, question: "交通案件之處罰其刑事責任部分,仍適用刑事法律有關規定處理之。", answer: true },
      { id: 212, question: "發生道路交通事故但無人傷亡且車輛尚能行駛,或有人受傷且當事人均同意移置車輛時,不須先標繪車輛位置及現場痕跡證據,即可將車輛移置不妨礙交通之處所。", answer: false },
      { id: 213, question: "發生道路交通事故其地點在高速公路時,應於距離事故地點後方100公尺處豎立車輛故障標誌或其他明顯警告設施。", answer: true },
      { id: 214, question: "發生道路交通事故其地點在最高速限50公里以下之路段,應於事故地點後方50公尺處,豎立車輛故障標誌或其他明顯警告設施。", answer: false },
      { id: 215, question: "道路交通事故案件當事人或利害關係人,於發生事故時不得申請提供道路交通事故當事人登記聯單。", answer: false },
      { id: 216, question: "道路交通事故資料之閱覽應於警察機關之辦公處所為之,不得攜出或塗改增刪;警察機關得以複印或備份方式提供現場照片。", answer: true },
      { id: 217, question: "汽車行駛高速公路或快速公路,內側車道為超車道,但小型車於不堵塞行車之狀況下,得以該路段容許之最高速限行駛於內側車道。", answer: true },
      { id: 218, question: "汽車行駛高速公路或快速公路在行駛途中,除遇特殊狀況必須減速外,不得驟然減速或在車道中臨時停車或停車。", answer: true },
      { id: 219, question: "汽車在行駛途中,不得驟然或任意變換車道,如欲超越前車或變換車道時,應先顯示方向燈告知前後車輛,並保持安全距離及間隔,方得超越或變換車道。", answer: true },
      { id: 220, question: "汽車行駛高速公路及快速公路,遇有濃霧、濃煙、強風、大雨等特殊狀況嚴重影響行車安全時,得在路肩暫停,並應顯示危險警告燈,視線清晰時,應即恢復行駛。", answer: true },
      { id: 221, question: "汽車行駛交通阻塞之路段,除應遵守交通勤務警察指揮外,駕駛人不得以任何理由將車輛暫停或停駐路肩,以免阻礙消防車、警備車、救護車,工程車及救濟車進入現場清理或急救。", answer: true },
      { id: 222, question: "為維護高速公路或快速公路交通安全與暢通,高速公路及快速公路管理機關或警察機關於必要時,得發布命令,指定時段於高速公路及快速公路特定匝道或路段之車道、路肩,禁止、限制或開放車輛通行。", answer: true },
      { id: 223, question: "分向限制線用以劃分路面成雙向車道,禁止車輛跨越行駛,並不得迴轉。", answer: true },
      { id: 224, question: "分向限制線,為雙黃實線,線寬及間隔均為10公分。", answer: true },
      { id: 225, question: "禁止變換車道線,為雙白實線,雙邊禁止變換。", answer: true },
      { id: 226, question: "禁止臨時停車線,本標線禁止時間為全日24小時,如有縮短之必要時,應以標誌及附牌標示之。", answer: true },
      { id: 227, question: "讓路線,用以警告車輛駕駛人前有幹道應減速慢行,或停車讓幹道車先行。", answer: true },
      { id: 228, question: "「停」標字,用以指示車輛至此必須停車再開。", answer: true },
      { id: 229, question: "開車的人無駕駛道德,是自己的不幸,也是別人的不幸。", answer: true },
      { id: 230, question: "兩個乘客上車後從竊竊私語中發現他們是販賣毒品的人,我們為了為國除害,一定要設法向警察機關報案不使他們逃走。", answer: true },
      { id: 231, question: "閃光黃燈表示「停車再開」,車輛應減速慢行,注意安全,小心通過。", answer: false },
      { id: 232, question: "閃光紅燈表示「警告」,車輛應減速接近,先停止於交岔路口前,讓幹道車優先通行後認為安全時,方得續行。", answer: false },
      { id: 233, question: "車種專用車道標線,用以指示僅限於某車種行駛之專用車道,其他車種及行人不得進入。本標線由白色菱形劃設之。", answer: true },
      { id: 234, question: "路旁障礙物體線,用以表示路旁之障礙物體,促使車輛駕駛人提高警覺。本標線為黃黑相間斜紋線,但護欄、緣石及行道樹得標繪白色。", answer: true },
      { id: 235, question: "禁止停車線,本標線禁止時間為每日上午8時至晚間7時。", answer: false },
      { id: 236, question: "禁止臨時停車線,本標線禁止時間為每日上午5時至晚間7時。", answer: false },
      { id: 237, question: "汽車駕駛人於領得合格成績單6個月內檢附合格成績單及執業事實證明文件,向同一營業區任一警察局辦妥執業登記。", answer: false },
      { id: 238, question: "汽車駕駛人未按指定日期參加測驗、執業前講習者,應重新申請辦理執業登記。", answer: true },
      { id: 239, question: "計程車駕駛人受僱情形如有異動,應於7日內向原發證警察機關申報。", answer: false },
      { id: 240, question: "逾越執業登記證年度查驗期限6個月以上仍未辦理者,應廢止執業登記並追繳登記證,且1年內不得重新辦理執業登記。", answer: true },
      { id: 241, question: "計程車駕駛人因不依規定期限，辦理執業登記事項之異動申報，或參加年度查驗者經依規定廢止執業登記者，未滿1年不得再行辦理執業登記。", answer: true },
      { id: 242, question: "已領有個人經營計程車客運業營業執照者,不得申請加入計程車運輸合作社。", answer: true },

    // ===== 工具函數 =====
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    function formatTime(ms) {

      if (!list.find(q => (q.id || q.q) === identifier)) {

        });

      }

    // ===== 智慧抽題函數 =====
    function smartSelect(questions, count, usedSet, idKey = 'id') {
      const getKey = (q) => q[idKey] || q.q || JSON.stringify(q);
      const unused = questions.filter(q => !usedSet.has(getKey(q)));
      const used = questions.filter(q => usedSet.has(getKey(q)));
      
      let selected = [];
      
      if (unused.length >= count) {
        selected = shuffle(unused).slice(0, count);
      } else {
        selected = [...shuffle(unused)];
        const remaining = count - unused.length;
        if (remaining > 0 && used.length > 0) {
          selected = [...selected, ...shuffle(used).slice(0, remaining)];
        }
      }
      
      selected.forEach(q => usedSet.add(getKey(q)));
      
      if (usedSet.size >= questions.length) {
        usedSet.clear();
        selected.forEach(q => usedSet.add(getKey(q)));
      }
      
      return selected;
    }

      } else if (city && questionBank[city]) {

      } else {
        // 預設用綜合
        geoTFPool = questionBank.allcities.tf;
        geoMCPool = questionBank.allcities.mc;
      }
      
      const geoTF = smartSelect(geoTFPool, 20, usedQuestions.geoTF, 'q').map(q => ({
        ...q,

      }));

      }));
      
      // 先出交通法令50題，再出地理環境50題（各自內部隨機）
      questions = [...shuffle([...trafficTF, ...trafficMC]), ...shuffle([...geoTF, ...geoMC])];
      
      return questions;
    }
    
    // ===== 計算分數 =====
    function calculateScores() {
      let trafficCorrect = 0;
      let trafficTotal = 0;
      let geoCorrect = 0;
      let geoTotal = 0;
      
      state.questions.forEach((q, i) => {
        const userAnswer = state.answers[i];
        let isCorrect = false;
        
        if (q.subject === 'traffic') {
          trafficTotal++;
          if (q.type === 'tf') {
            isCorrect = (userAnswer === 0 && q.answer === true) || (userAnswer === 1 && q.answer === false);
          } else {
            isCorrect = userAnswer === (q.answer - 1);
          }
          if (isCorrect) trafficCorrect++;
        } else {
          geoTotal++;
          if (q.type === 'tf') {
            isCorrect = (userAnswer === 0 && q.a === true) || (userAnswer === 1 && q.a === false);
          } else {
            isCorrect = userAnswer === (q.a - 1);
          }
          if (isCorrect) geoCorrect++;
        }
      });
      
      const trafficScore = trafficTotal > 0 ? Math.round((trafficCorrect / trafficTotal) * 100) : 0;
      const geoScore = geoTotal > 0 ? Math.round((geoCorrect / geoTotal) * 100) : 0;
      const avgScore = Math.round((trafficScore + geoScore) / 2);
      
      return {
        trafficCorrect,
        trafficTotal,
        trafficScore,
        geoCorrect,
        geoTotal,
        geoScore,
        avgScore,
        totalCorrect: trafficCorrect + geoCorrect,
        totalQuestions: trafficTotal + geoTotal,
        passed: avgScore >= 70
      };
    }

              </div>
            </div>
            
            <button class="btn-primary" id="startBtn" ${!state.selectedCity ? 'disabled' : ''}>
              開始考試 →
            </button>
            
            ${wrongCount.total > 0 ? `
              <button class="btn-primary" id="wrongQuizBtn" style="margin-top: 12px; background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">
                📝 練習錯題 (${wrongCount.total}題)
              </button>
              <button class="btn-secondary" id="clearWrongBtn" style="margin-top: 8px; width: 100%; color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.2);">
                清除錯題紀錄
              </button>
            ` : ''}
            
            <a href="index.html" style="display: block; text-align: center; margin-top: 20px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px;">← 返回首頁</a>
          </div>
        </div>
      `;
    }

    // ===== 渲染測驗 =====
    function renderQuiz() {
      const q = state.questions[state.currentIndex];
      const progress = ((state.currentIndex + 1) / state.questions.length) * 100;
      const answered = state.answers[state.currentIndex] !== undefined;
      
      const subjectName = q.subject === 'traffic' ? '交通法令' : '地理環境';
      const subjectClass = q.subject === 'traffic' ? 'subject-traffic' : 'subject-geography';
      const typeName = q.type === 'tf' ? '是非題' : '選擇題';
      const typeClass = q.type === 'tf' ? 'type-tf' : 'type-mc';
      
      // 取得題目文字和選項
      const questionText = q.question || q.q;
      let options = [];
      let correctIndex;
      
      if (q.type === 'tf') {
        options = ['○ 是 (正確)', '╳ 否 (錯誤)'];
        const ans = q.answer !== undefined ? q.answer : q.a;
        correctIndex = ans ? 0 : 1;
      } else {
        options = q.options || q.o;
        const ans = q.answer !== undefined ? q.answer : q.a;
        correctIndex = ans - 1;
      }
      
      return `
        <div class="card">
          <div class="quiz-header">
            <span class="quiz-progress">第 ${state.currentIndex + 1} / ${state.questions.length} 題</span>
            <span class="quiz-timer" id="timer">00:00</span>
          </div>
          
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progress}%"></div>
          </div>
          
          <span class="quiz-subject ${subjectClass}">${subjectName}</span>
          <span class="question-type ${typeClass}">${typeName}</span>
          
          <div class="question-text">${questionText}</div>
          
          <div class="options">
            ${options.map((opt, i) => {
              let cls = 'option-btn';
              if (answered) {
                if (i === correctIndex) cls += ' correct';
                else if (state.answers[state.currentIndex] === i && i !== correctIndex) cls += ' wrong';
              } else if (state.answers[state.currentIndex] === i) {
                cls += ' selected';
              }
              return `<button class="${cls}" data-option="${i}" ${answered ? 'disabled' : ''}>${opt}</button>`;
            }).join('')}
          </div>
          
          ${answered ? `
            <div class="answer-feedback ${state.answers[state.currentIndex] === correctIndex ? 'feedback-correct' : 'feedback-wrong'}">
              ${state.answers[state.currentIndex] === correctIndex ? '✓ 答對了！' : `✗ 答錯了！正確答案：${options[correctIndex]}`}
            </div>
            <button class="nav-btn" id="nextBtn">
              ${state.currentIndex < state.questions.length - 1 ? '下一題 →' : '查看結果'}
            </button>
          ` : ''}
        </div>
      `;
    }

    // ===== 渲染結果 =====
    function renderResult() {
      const scores = calculateScores();
      const duration = state.endTime - state.startTime;
      
      // 計算練習進度
      const trafficTFUsed = usedQuestions.trafficTF.size;
      const trafficTFTotal = trafficTrueFalse.length;
      const trafficMCUsed = usedQuestions.trafficMC.size;
      const trafficMCTotal = trafficMultipleChoice.length;
      const geoTFUsed = usedQuestions.geoTF.size;
      const geoTFTotal = questionBank.allcities.tf.length;
      const geoMCUsed = usedQuestions.geoMC.size;
      const geoMCTotal = questionBank.allcities.mc.length;
      
      const trafficUsed = trafficTFUsed + trafficMCUsed;
      const trafficTotal = trafficTFTotal + trafficMCTotal;
      const trafficRemain = trafficTotal - trafficUsed;
      const geoUsed = geoTFUsed + geoMCUsed;
      const geoTotal = geoTFTotal + geoMCTotal;
      const geoRemain = geoTotal - geoUsed;
      
      return `
        <div class="card center">
          <div class="icon-xlarge">${scores.passed ? '🎉' : '📚'}</div>
          <h2>考試完成！</h2>
          
          <div class="result-score ${scores.passed ? 'result-pass' : 'result-fail'}">${scores.avgScore}</div>
          <div class="result-badge ${scores.passed ? 'badge-pass' : 'badge-fail'}">
            ${scores.passed ? '✓ 考試通過' : '✗ 未通過'}
          </div>
          
          <div class="score-breakdown">
            <div class="score-breakdown-title">📊 各科成績</div>
            <div class="score-row">
              <span class="score-label">📜 交通法令</span>
              <span class="score-value score-traffic">${scores.trafficScore} 分 (${scores.trafficCorrect}/${scores.trafficTotal})</span>
            </div>
            <div class="score-row">
              <span class="score-label">🗺️ 地理環境</span>
              <span class="score-value score-geography">${scores.geoScore} 分 (${scores.geoCorrect}/${scores.geoTotal})</span>
            </div>
            <div class="score-row">
              <span class="score-label">📝 平均分數</span>
              <span class="score-value score-average">${scores.avgScore} 分</span>
            </div>
          </div>
          
          <div class="stats-grid">
            <div class="stat-box stat-box-correct">
              <div class="stat-number stat-number-correct">${scores.totalCorrect}</div>
              <div class="stat-label">答對題數</div>
            </div>
            <div class="stat-box stat-box-wrong">
              <div class="stat-number stat-number-wrong">${scores.totalQuestions - scores.totalCorrect}</div>
              <div class="stat-label">答錯題數</div>
            </div>
          </div>
          
          <div class="time-box">
            <span class="time-text">⏱️ 作答時間：${formatTime(duration)}</span>
          </div>
          
          <div style="margin: 16px 0; padding: 16px; background: rgba(99, 102, 241, 0.1); border-radius: 12px; border: 1px solid rgba(99, 102, 241, 0.3);">
            <div style="color: #a5b4fc; font-weight: 600; margin-bottom: 8px;">📊 練習進度</div>
            <div style="color: rgba(255,255,255,0.8); font-size: 14px; line-height: 1.8;">
              交通法令：${trafficUsed} / ${trafficTotal} 題 
              <span style="color: ${trafficRemain > 0 ? '#fbbf24' : '#34d399'};">(剩餘 ${trafficRemain} 題)</span><br>
              地理環境：${geoUsed} / ${geoTotal} 題 
              <span style="color: ${geoRemain > 0 ? '#fbbf24' : '#34d399'};">(剩餘 ${geoRemain} 題)</span>
            </div>
            ${trafficRemain === 0 && geoRemain === 0 ? '<div style="color: #34d399; font-size: 13px; margin-top: 8px;">✅ 全部題目都練習過了！再考一次將重新開始</div>' : ''}
          </div>
          
          <div style="margin-bottom: 16px; padding: 12px; background: ${scores.passed ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)'}; border-radius: 10px; border: 1px solid ${scores.passed ? 'rgba(16, 185, 129, 0.3)' : 'rgba(239, 68, 68, 0.3)'};">
            <span style="color: ${scores.passed ? '#34d399' : '#f87171'}; font-size: 14px;">
              ${scores.passed ? '🎉 恭喜！兩科平均達 70 分及格標準' : '⚠️ 兩科平均未達 70 分，請繼續努力！'}
            </span>
          </div>
          
          <div class="btn-group">
            <button class="btn-secondary" id="reviewBtn">查看答案</button>
            <button class="btn-secondary" id="wrongOnlyBtn" style="border-color: #ef4444; color: #f87171;">只看錯題</button>
          </div>
          
          <div class="btn-group">
            <button class="btn-secondary" id="menuBtn">返回選單</button>
            <button class="btn-primary" id="retryBtn" style="flex: 1;">再考一次</button>
          </div>
        </div>
      `;
    }

    // ===== 主渲染 =====
    function render() {
      const app = document.getElementById('app');
      
      if (state.screen === 'menu') {
        app.innerHTML = renderMenu();
      } else if (state.screen === 'quiz') {
        app.innerHTML = renderQuiz();
      } else if (state.screen === 'result') {
        app.innerHTML = renderResult();
      }
      
      attachEvents();
    }
    
    // ===== 計時器 =====
    let timerInterval;
    function startTimer() {
      state.startTime = Date.now();
      timerInterval = setInterval(() => {
        const el = document.getElementById('timer');
        if (el) {
          const elapsed = Date.now() - state.startTime;
          const m = Math.floor(elapsed / 60000);
          const s = Math.floor((elapsed % 60000) / 1000);
          el.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
      }, 1000);
    }
    
    function stopTimer() {
      state.endTime = Date.now();
      clearInterval(timerInterval);
    }
    
    // ===== 事件處理 =====
    function attachEvents() {
      // 城市選擇
      document.querySelectorAll('[data-city]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedCity = btn.dataset.city;
          render();
        });
      });
      
      // 開始考試
      const startBtn = document.getElementById('startBtn');
      if (startBtn) {
        startBtn.addEventListener('click', () => {
          state.questions = prepareQuestions(state.selectedCity);
          state.currentIndex = 0;
          state.answers = [];
          state.screen = 'quiz';
          render();
          startTimer();
        });
      }
      
      // 練習錯題
      const wrongQuizBtn = document.getElementById('wrongQuizBtn');
      if (wrongQuizBtn) {
        wrongQuizBtn.addEventListener('click', () => {
          const wrongQs = loadWrongQuestions();
          let questions = [];
          
          wrongQs.trafficTF.forEach(q => questions.push({ ...q, subject: 'traffic', type: 'tf' }));
          wrongQs.trafficMC.forEach(q => questions.push({ ...q, subject: 'traffic', type: 'mc' }));
          wrongQs.geoTF.forEach(q => questions.push({ ...q, subject: 'geography', type: 'tf' }));
          wrongQs.geoMC.forEach(q => questions.push({ ...q, subject: 'geography', type: 'mc' }));
          
          if (questions.length === 0) {
            alert('沒有錯題可練習！');
            return;
          }
          
          state.questions = shuffle(questions);
          state.currentIndex = 0;
          state.answers = [];
          state.selectedCity = 'all';
          state.screen = 'quiz';
          render();
          startTimer();
        });
      }
      
      // 清除錯題
      const clearWrongBtn = document.getElementById('clearWrongBtn');
      if (clearWrongBtn) {
        clearWrongBtn.addEventListener('click', () => {
          if (confirm('確定要清除所有錯題紀錄嗎？')) {
            clearAllWrongQuestions();
            render();
          }
        });
      }
      
      // 選項
      document.querySelectorAll('[data-option]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (state.answers[state.currentIndex] === undefined) {
            const selectedOption = parseInt(btn.dataset.option);
            state.answers[state.currentIndex] = selectedOption;
            
            // 記錄錯題
            const currentQ = state.questions[state.currentIndex];
            let correctIndex;
            if (currentQ.subject === 'traffic') {
              if (currentQ.type === 'tf') {
                correctIndex = currentQ.answer ? 0 : 1;
              } else {
                correctIndex = currentQ.answer - 1;
              }
            } else {
              if (currentQ.type === 'tf') {
                correctIndex = currentQ.a ? 0 : 1;
              } else {
                correctIndex = currentQ.a - 1;
              }
            }
            
            if (selectedOption === correctIndex) {
              removeWrongQuestion(currentQ);
            } else {
              addWrongQuestion(currentQ);
            }
            
            render();
          }
        });
      });
      
      // 下一題
      const nextBtn = document.getElementById('nextBtn');
      if (nextBtn) {
        nextBtn.addEventListener('click', () => {
          if (state.currentIndex < state.questions.length - 1) {
            state.currentIndex++;
            render();
          } else {
            stopTimer();
            state.screen = 'result';
            render();
          }
        });
      }
      
      // 返回選單
      const menuBtn = document.getElementById('menuBtn');
      if (menuBtn) {
        menuBtn.addEventListener('click', () => {
          usedQuestions.trafficTF.clear();
          usedQuestions.trafficMC.clear();
          usedQuestions.geoTF.clear();
          usedQuestions.geoMC.clear();
          state.screen = 'menu';
          state.selectedCity = null;
          render();
        });
      }
      
      // 再考一次
      const retryBtn = document.getElementById('retryBtn');
      if (retryBtn) {
        retryBtn.addEventListener('click', () => {
          state.questions = prepareQuestions(state.selectedCity);
          state.currentIndex = 0;
          state.answers = [];
          state.screen = 'quiz';
          render();
          startTimer();
        });
      }
      
      // 查看答案
      const reviewBtn = document.getElementById('reviewBtn');
      if (reviewBtn) {
        reviewBtn.addEventListener('click', () => showReview(false));
      }
      
      // 只看錯題
      const wrongOnlyBtn = document.getElementById('wrongOnlyBtn');
      if (wrongOnlyBtn) {
        wrongOnlyBtn.addEventListener('click', () => showReview(true));
      }
    }
    
    // ===== 查看答案 =====
    function showReview(wrongOnly) {
      let items = [];
      
      state.questions.forEach((q, i) => {
        const userAnswer = state.answers[i];
        const questionText = q.question || q.q;
        let options, correctIndex;
        
        if (q.type === 'tf') {
          options = ['○ 是', '╳ 否'];
          const ans = q.answer !== undefined ? q.answer : q.a;
          correctIndex = ans ? 0 : 1;
        } else {
          options = q.options || q.o;
          const ans = q.answer !== undefined ? q.answer : q.a;
          correctIndex = ans - 1;
        }
        
        const isCorrect = userAnswer === correctIndex;
        
        if (wrongOnly && isCorrect) return;
        
        items.push(`
          <div class="review-item ${isCorrect ? 'correct' : 'wrong'}">
            <div style="margin-bottom: 8px;">
              <span class="quiz-subject ${q.subject === 'traffic' ? 'subject-traffic' : 'subject-geography'}" style="font-size: 11px; padding: 2px 8px;">
                ${q.subject === 'traffic' ? '交通法令' : '地理環境'}
              </span>
              <span class="question-type ${q.type === 'tf' ? 'type-tf' : 'type-mc'}" style="font-size: 11px; padding: 2px 8px;">
                ${q.type === 'tf' ? '是非題' : '選擇題'}
              </span>
            </div>
            <div class="review-question">${i + 1}. ${questionText}</div>
            <div class="review-answer">
              正確答案：<strong>${options[correctIndex]}</strong>
              ${!isCorrect ? `<br>你的答案：<span class="user-wrong">${options[userAnswer] || '未作答'}</span>` : ''}
            </div>
          </div>
        `);
      });
      
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-content">
          <div class="modal-header">
            <span class="modal-title">${wrongOnly ? '錯題檢討' : '全部答案'} (${items.length}題)</span>
            <button class="modal-close" id="closeModal">×</button>
          </div>
          ${items.length > 0 ? items.join('') : '<p style="text-align:center; color: rgba(255,255,255,0.6); padding: 40px;">🎉 太棒了！沒有錯題</p>'}
        </div>
      `;
      
      document.body.appendChild(modal);
      
      document.getElementById('closeModal').addEventListener('click', () => modal.remove());
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }
    
    // ===== 初始化 =====
    render();
  </script>
</body>
</html>
